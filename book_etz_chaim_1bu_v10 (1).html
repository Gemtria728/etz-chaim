<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>에츠 하임 — 생명나무</title>
<style>
html,body{margin:0;padding:0;background:#f4efe8;font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;}
.wrap{display:flex;flex-direction:column;align-items:center;padding:16px 8px 24px;}
h1{font-size:15px;font-weight:700;color:#1a2b4a;margin-bottom:2px;text-align:center;letter-spacing:0.03em;}
.subtitle{font-size:11px;color:#1f7e79;margin-bottom:14px;text-align:center;}

/* SVG */
.svg-wrap{width:100%;max-width:270px;filter:drop-shadow(0 4px 16px rgba(31,62,90,0.08));}
svg{width:100%;height:auto;}
.path-char{cursor:pointer;transition:opacity 0.15s;}
.path-char:hover{opacity:0.5;}
.sefira-node{cursor:pointer;}

/* 패널 */
.panel{width:90%;max-width:310px;margin-top:16px;border-radius:14px;
  overflow:hidden;box-shadow:0 2px 16px rgba(31,62,90,0.10);background:#fff;}
.panel-img{width:100%;height:130px;object-fit:cover;display:block;}
.panel-img-placeholder{width:100%;height:130px;display:flex;align-items:center;
  justify-content:center;font-size:22px;color:rgba(255,255,255,0.7);font-weight:700;letter-spacing:0.05em;}
.panel-body{padding:14px 16px;}
.panel-type{font-size:10px;color:#c9a84c;letter-spacing:0.1em;font-weight:700;margin-bottom:3px;}
.panel-name{font-size:18px;font-weight:700;color:#1a2b4a;margin-bottom:3px;}
.panel-sub{font-size:12px;color:#1f7e79;margin-bottom:9px;}
.panel-desc{font-size:13px;color:#555;line-height:1.82;}
.panel-empty{padding:32px 16px;text-align:center;font-size:13px;color:#bbb;background:#fff;border-radius:14px;}

footer{text-align:center;padding:1.2rem;font-size:11px;color:#bbb;}
.panel-summary{font-size:13px;color:#1a2b4a;line-height:1.75;font-weight:600;margin-bottom:10px;}
.read-more-btn{background:none;border:1px solid #1f7e79;color:#1f7e79;font-size:12px;padding:4px 12px;border-radius:12px;cursor:pointer;margin-bottom:10px;font-family:inherit;}
.read-more-btn:hover{background:#e8f4f3;}
.panel-more{font-size:13px;color:#555;line-height:1.82;}
</style>
</head>
<body>
<div class="wrap">
  <h1>에츠 하임 (עץ החיים)</h1>
  <div class="subtitle">세피라 또는 경로 문자를 터치하세요</div>

  ayin:{name:'아인 (ע)',num:'70',route:'호드 ↔ 티페레트',desc:'눈(眼)을 뜻하는 문자. 두 개의 눈을 품고 있습니다. 나쁜 눈(아인 라아)은 표면을 재고 판단하는 시선. 좋은 눈(아인 토바)은 이면에 좋은 것을 발견하는 눈. 판단하는 눈에서 이해하는 눈으로 전환되는 경로.'},
  peh:{name:'페 (פ)',num:'80',route:'티페레트 ↔ 호드',desc:'입(口)을 뜻하는 문자. 심장의 중심(티페레트)에서 언어와 지성(호드)으로 내려오는 경로. 페는 침묵 속의 말, 아직 언어가 되지 않은 내면의 목소리를 상징합니다. 마음이 말이 되는 순간의 경로.'},
  tzadi:{name:'짜디 (צ)',num:'90',route:'네짜흐 ↔ 예소드',desc:'낚시바늘을 뜻하는 문자. 물속에서만 살던 물고기를 물 밖으로 꺼내는 경로. 열망(네짜흐)에서 기억의 심연(예소드)으로 이어지는 길. 억눌린 것들이 처음으로 목소리를 내는 자리. 아프지만 절망이 없는 이유 — 짜디의 길은 파괴가 아니라 해소이기 때문입니다.'},
  qof:{name:'쿠프 (ק)',num:'100',route:'호드 ↔ 말쿠트',desc:'뒤통수를 뜻하는 문자. 지성(호드)에서 현실의 땅(말쿠트)으로 내려오는 경로. 쿠프는 물질 세계의 가장 낮은 영적 주파수를 다루는 경로입니다. 신성함과 세속 사이의 경계, 진짜를 가려내는 분별의 길.'},
  resh:{name:'레쉬 (ר)',num:'200',route:'기억과 무의식(예소드) ↔ 아름다움(티페레트)',
    summary:'레쉬의 길은 지하 주차장에서 루프탑으로 올라가는 직통 엘리베이터입니다. 가장 참혹한 밤을 통과해야만 문이 열립니다. 그러나 반드시 새벽이 옵니다.',
    desc:'머리(Head)를 뜻하는 문자. 삶의 방향을 결정하는 의식의 중심을 상징합니다. 달이 지배하는 예소드(기억과 무의식의 밤)에서 티페레트(심장의 중심, 태양의 자리)로 향하는 경로. 그래서 레쉬는 연금술의 경로로 불립니다.<br><br>이 길에서는 이상한 일들이 일어납니다. 사람들이 이유 없이 떠나고, 가장 믿었던 사람에게 배신을 당하기도 합니다. 황금 동앗줄처럼 보이던 것이 다음 날 아침에 도깨비 빗자루가 되어 있습니다. 붙잡을수록 거품처럼 잡히지 않습니다. 외로운 늑대의 길, 고독한 밤의 길입니다.<br><br>에고는 이 밤을 실패로 읽습니다. 그러나 레쉬에서 붙잡으려 할수록 더 빠져나갑니다. 이 밤은 에고의 생존 전략이 더 이상 작동하지 않는 자리이기 때문입니다. 레쉬에서 처음으로 배우게 되는 단 하나의 질문이 있습니다. 두려움 앞에서도 자기 자신으로 설 수 있는가?<br><br>레쉬를 엘리베이터로 이해하면 이 경로의 본질이 더 선명해집니다. 지하 주차장(예소드)에서 가장 높은 루프탑(티페레트)으로 올라가는 직통 엘리베이터입니다. 이 엘리베이터를 타면 지층이 바뀝니다. 물질 세계의 관점에서 정신적 관점으로 이동합니다. 감정과 충동대로 반응하던 방식에서 잠시 멈출 수 있는 여유가 생깁니다. 관망하는 제3의 눈이 발달하기 시작합니다. 허둥지둥하는 나를 바라보는 또 다른 내가 생겨납니다.<br><br>그러나 이 엘리베이터는 준비된 사람에게만 문이 열립니다. 밤을 통과한 사람, 붙잡으려는 손을 내려놓은 사람, 두려움 앞에서도 자기 자신으로 서 있기로 선택한 사람에게만.<br><br>게마트리아 200. 에고의 생존 본능에서 Self의 인도로 삶의 주도권이 이동할 때, 비로소 그 무게는 짐이 아니라 방향이 됩니다.<br><br><em>레쉬는 두려움을 없애는 길이 아닙니다. 밤을 없애는 것이 아니라, 밤을 끝까지 걷는 길입니다. 이 책에서 레쉬는 2부 뉴질랜드 베델스 비치에서 처음 등장합니다.</em>'},
  shin:{name:'신 (ש)',num:'300',route:'비나 ↔ 호크마',desc:'불꽃을 뜻하는 문자. 이해(비나)와 지혜(호크마)를 연결하는 가로 경로. 신은 영적 불꽃을 상징합니다. 세 개의 불꽃 — 신성한 불, 태양의 불, 반사된 불. 지혜와 이해가 만날 때 피어나는 통찰의 불꽃.'},
  tav:{name:'타브 (ת)',num:'400',route:'예소드 ↔ 말쿠트',desc:'십자가, 또는 표시(mark)를 뜻하는 문자. 히브리 알파벳의 마지막 문자. 기초(예소드)에서 현실(말쿠트)로 내려오는 마지막 경로. 타브는 완성과 봉인을 상징합니다. 영적 여정의 모든 에너지가 물질 세계로 현현되는 자리.'}
};

function showSefira(key) {
  var d = SEFIROT[key];
  if (!d) return;
  var cityTag = d.city ? '<div style="font-size:11px;color:#c9a84c;font-weight:700;margin-bottom:8px;letter-spacing:0.05em;">✦ ' + d.city + '</div>' : '';
  var imgMap = {
    yesod:'yesod', netzach:'prague', chesed:'prague',
    binah:'tiphereth', hod:'split_img', gevurah:'gevurah',
    chokmah:'chokmah', tiphereth:'tiphereth'
  };
  // 스플리트는 호드 이미지 대신 별도
  var imgSrc = key === 'hod' ? CITY_IMGS['split_img'] : CITY_IMGS[imgMap[key]];
  var topHtml = imgSrc
    ? '<img src="' + imgSrc + '" style="width:100%;height:140px;object-fit:cover;object-position:center top;display:block;"/>'
    : '<div class="panel-img-placeholder" style="background:linear-gradient(135deg,'+d.color1+','+d.color2+')">' +
      '<span style="text-shadow:0 2px 8px rgba(0,0,0,0.3)">' + (d.city || d.name) + '</span></div>';
  document.getElementById('panel').innerHTML =
    '<div class="panel">' + topHtml +
    '<div class="panel-body">' +
    '<div class="panel-type">세피라 · ' + d.num + '</div>' +
    '<div class="panel-name">' + d.name + '</div>' +
    '<div class="panel-sub">' + d.title + '</div>' +
    cityTag +
    '<div class="panel-desc">' + d.desc + '</div>' +
    '</div></div>';
}

function showPath(key) {
  var d = PATHS[key];
  if (!d) return;
  var hasMore = d.summary && d.desc;
  var content = hasMore
    ? '<div class="panel-summary">' + d.summary + '</div>' +
      '<button class="read-more-btn" onclick="toggleMore(this)">더 읽기 ▾</button>' +
      '<div class="panel-more" style="display:none">' + d.desc + '</div>'
    : '<div class="panel-desc">' + d.desc + '</div>';
  document.getElementById('panel').innerHTML =
    '<div class="panel">' +
    '<div class="panel-img-placeholder" style="background:linear-gradient(135deg,#e8eef8,#1a2b4a);font-size:40px;letter-spacing:0">' +
    d.name.split(' ')[1] +
    '</div>' +
    '<div class="panel-body">' +
    '<div class="panel-type">경로 · ' + d.route + '</div>' +
    '<div class="panel-name">' + d.name + '</div>' +
    '<div class="panel-sub">수치 ' + d.num + '</div>' +
    content +
    '</div></div>';
}

function toggleMore(btn) {
  var more = btn.nextElementSibling;
  if (more.style.display === 'none') {
    more.style.display = 'block';
    btn.textContent = '접기 ▴';
  } else {
    more.style.display = 'none';
    btn.textContent = '더 읽기 ▾';
  }
}
</script>
</body>
</html>
